version: 2

models:

  - name: int_lineitem_enriched
    description: "Intermediate model that enriches line item data with customer, product, supplier, and geographic context. Defines core business metrics such as revenue, cost, and profit at line item level."
    columns:

      - name: lineitem_id
        description: "Unique identifier for each line item, constructed from order_key and line_number."
        tests:
          - not_null
          - unique

      - name: order_key
        description: "Foreign key linking the line item to its corresponding order."
        tests:
          - not_null

      - name: customer_key
        description: "Foreign key identifying the customer associated with the order."
        tests:
          - not_null

      - name: net_revenue
        description: "Revenue after discount, calculated as extended_price multiplied by (1 - discount)."
        tests:
          - not_null

      - name: total_cost
        description: "Total cost of the line item, calculated as quantity multiplied by supplier cost."
        tests:
          - not_null

      - name: profit
        description: "Profit generated by the line item, calculated as net_revenue minus total_cost."
        tests:
          - not_null