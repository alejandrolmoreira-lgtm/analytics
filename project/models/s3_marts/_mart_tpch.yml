version: 2

models:

  - name: fact_lineitem
    columns:

      - name: lineitem_id
        tests:
          - unique
          - not_null

      - name: customer_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

      - name: part_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_part')
                field: part_key

      - name: supp_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supp_key


  - name: dim_customer
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null


  - name: dim_part
    columns:
      - name: part_key
        tests:
          - unique
          - not_null


  - name: dim_supplier
    columns:
      - name: supp_key
        tests:
          - unique
          - not_null