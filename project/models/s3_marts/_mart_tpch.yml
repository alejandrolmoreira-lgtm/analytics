version: 2

models:

  - name: fact_lineitem
    description: "Fact table at line item level. Contains transactional data enriched with business metrics such as revenue, cost, and profit."
    columns:

      - name: lineitem_id
        description: "Unique identifier for each line item, representing the grain of the fact table."
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Foreign key referencing the customer associated with the order."
        tests:
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key

      - name: part_key
        description: "Foreign key referencing the product included in the line item."
        tests:
          - relationships:
              arguments:
                to: ref('dim_part')
                field: part_key

      - name: supp_key
        description: "Foreign key referencing the supplier providing the product."
        tests:
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supp_key

      - name: profit
        description: "Profit generated by the line item, calculated as net revenue minus total cost."


  - name: dim_customer
    description: "Dimension table containing customer attributes and geographic information."
    columns:
      - name: customer_key
        description: "Primary key identifying each customer."
        tests:
          - unique
          - not_null


  - name: dim_part
    description: "Dimension table containing product attributes including pricing information."
    columns:
      - name: part_key
        description: "Primary key identifying each product."
        tests:
          - unique
          - not_null


  - name: dim_supplier
    description: "Dimension table containing supplier information and geographic context."
    columns:
      - name: supp_key
        description: "Primary key identifying each supplier."
        tests:
          - unique
          - not_null