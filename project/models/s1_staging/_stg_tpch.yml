version: 2

models:

  - name: stg_orders
    description: "Staging model for orders data. Cleans and standardizes raw TPCH orders table."
    columns:
      - name: cust_key
        description: "Foreign key referencing the customer placing the order."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customer')
                field: cust_key

  - name: stg_lineitem
    description: "Staging model for line items. Represents individual items within each order."
    columns:
      - name: order_key
        description: "Foreign key linking each line item to its corresponding order."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_key

      - name: part_key
        description: "Foreign key identifying the product associated with the line item."
        tests:
          - relationships:
              arguments:
                to: ref('stg_part')
                field: part_key

      - name: supp_key
        description: "Foreign key identifying the supplier providing the product."
        tests:
          - relationships:
              arguments:
                to: ref('stg_supplier')
                field: supp_key